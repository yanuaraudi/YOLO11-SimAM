# Ultralytics YOLO11 object detection model with P3/8 - P5/32 outputs
# Model docs: https://docs.ultralytics.com/models/yolo11
# Task docs: https://docs.ultralytics.com/tasks/detect

# Parameters
nc: 3 # number of classes

# YOLO11n backbone
backbone:
  - [-1, 1, ResNet18Stage, [0]]   # 0 - stem (stride 4)
  - [-1, 1, ResNet18Stage, [1]]   # 1 - layer1, P2
  - [-1, 1, ResNet18Stage, [2]]   # 2 - layer2, P3 (128ch)
  - [-1, 1, ResNet18Stage, [3]]   # 3 - layer3, P4 (256ch)
  - [-1, 1, ResNet18Stage, [4]]   # 4 - layer4, P5 (512ch)
  - [-1, 1, SPPF, [512, 5]]       # 5
  - [-1, 2, C2PSA, [512]]         # 6

# YOLO11n head
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]               # 6  - upsample P5
  - [[-1, 2], 1, Concat, [1]]                                # 7  - cat with P4 (256+512=768)
  - [-1, 2, C3k2, [256, False]]                              # 8

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]               # 9  - upsample
  - [[-1, 1], 1, Concat, [1]]                                # 10 - cat with P3 (128+256=384)
  - [-1, 2, C3k2, [128, False]]                              # 11 (P3/8-small)

  - [-1, 1, Conv, [128, 3, 2]]                               # 12 - downsample
  - [[-1, 8], 1, Concat, [1]]                                # 13 - cat head P4
  - [-1, 2, C3k2, [256, False]]                              # 14 (P4/16-medium)

  - [-1, 1, Conv, [256, 3, 2]]                               # 15 - downsample
  - [[-1, 5], 1, Concat, [1]]                                # 16 - cat head P5
  - [-1, 2, C3k2, [512, True]]                               # 17 (P5/32-large)

  - [[11, 14, 17], 1, Detect, [nc]]                          # Detect(P3, P4, P5)
